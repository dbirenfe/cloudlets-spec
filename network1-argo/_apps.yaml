edgeApps:
  nginx-ingress:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-nginx-ingress
      helm:
        valueFiles:
        - values.yaml
      targetRevision: release/v2.1
  logging-agent:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-logging-agent
      helm:
        valueFiles:
        - values.yaml
hubApps:
  monitoring-stack:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-monitoring-stack
      helm:
        valueFiles:
        - values.yaml
  cert-manager:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-cert-manager
