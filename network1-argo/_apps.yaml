edgeApps:
  nginx-ingress:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-nginx-ingress
      helm:
        valueFiles:
        - values.yaml
    syncPolicy:
      automated:
        prune: true
        selfHeal: false
  logging-agent:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-logging-agent
      helm:
        valueFiles:
        - values.yaml
hubApps:
  monitoring-stack:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-monitoring-stack
      helm:
        valueFiles:
        - values.yaml
    syncPolicy:
      automated:
        prune: false
        selfHeal: true
      syncOptions:
      - ServerSideApply=true
      - PruneLast=true
  cert-manager:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-cert-manager
