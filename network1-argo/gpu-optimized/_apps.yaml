edgeApps:
  nginx-ingress:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-nginx-ingress
      helm:
        valueFiles:
        - values-gpu.yaml
    syncPolicy:
      automated:
        prune: false
        selfHeal: true
      syncOptions:
      - ServerSideApply=true
      - PruneLast=true
hubApps:
  monitoring-stack:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-monitoring-stack
      helm:
        valueFiles:
        - values-gpu.yaml
  gpu-operator:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-gpu-operator
