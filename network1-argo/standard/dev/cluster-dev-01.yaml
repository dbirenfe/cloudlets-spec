hubApps:
  monitoring-stack:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-monitoring-stack
      targetRevision: bugfix/memory-leak
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
        - ApplyOutOfSyncOnly=true

edgeApps:
  logging-agent:
    source:
      path: app
      repoURL: https://github.com/dbirenfe/app-logging-agent
      targetRevision: feature/json-parsing
      helm:
        valueFiles:
          - values.yaml
